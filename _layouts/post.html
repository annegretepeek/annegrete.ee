---
layout: default
---

<div class="blog-layout">

    <main class="blog-post">

        <article>

            <h1>{{ page.title }}</h1>

            <p class="post-date">
                {{ page.date | date: "%-d. %B %Y" }}
            </p>

            {% if page.image %}
            <img
                class="post-image"
                src="{{ page.image | relative_url }}"
                alt="{{ page.title }}">
            {% endif %}

            <div class="post-content">

                {{ content }}

            </div>

        </article>

    </main>

    {% include sidebar.html %}

</div>
